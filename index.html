<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎛️ A Voz da Entrega</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="src/css/main.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/animations.css">
  <script type="module" src="src/js/main.js"></script>
  </head>
<body>

<div id="app">
  <header>
    <div class="header-brand">
      <h1>🎛️ A Voz da Entrega</h1>
      <p id="status-line">carregando...</p>
    </div>
    <div class="header-actions">
      <span class="badge" id="sound-count">0 sons</span>
      <button class="btn btn-play" id="btn-play-queue" title="Reproduzir fila">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        PLAY
      </button>
      <button class="btn btn-primary" id="btn-add">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
        </svg>
        Novo botão
      </button>
      <button class="btn btn-danger" id="btn-reset">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.29"/>
        </svg>
        Reset
      </button>
    </div>
  </header>

  <div id="queue-bar">
    <div class="queue-header">
      <div class="queue-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Fila de reprodução
        <span class="queue-count" id="queue-count">0</span>
      </div>
      <button id="queue-clear">Limpar</button>
    </div>
    <div id="queue-list">
      <span class="queue-empty">Fila vazia — clique nos botões com ⊕ para adicionar à fila</span>
    </div>
  </div>

  <div id="tts-panel">
    <div class="tts-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      Text-to-Speech
    </div>
    <div class="tts-row">
      <input type="text" id="tts-input" placeholder="Digite o texto para falar ou criar botão..."/>
      <button id="tts-speak">🔊 Falar</button>
      <button id="tts-create">✨ Criar botão</button>
    </div>
  </div>

  <div id="grid">
    <div id="empty-msg">Nenhum botão ainda.<br>Clique em "Novo botão" para começar!</div>
  </div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" id="ctx-record">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    Gravar som
  </div>
  <div class="ctx-item" id="ctx-queue">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Adicionar à fila
  </div>
  <div class="ctx-item" id="ctx-rename">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Renomear
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" id="ctx-delete">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
    Excluir botão
  </div>
</div>

<div id="rec-panel">
  <div class="rec-target"><span id="rec-target-name">Botão</span></div>
  <button id="btn-rec" title="Gravar / Parar">⏺</button>
  <div id="rec-timer">0:00</div>
  <button id="btn-rec-cancel">Cancelar</button>
</div>

<div id="toast"></div>

<script type="module" src="../src/js/main.js"></script>
</body>
</html>
